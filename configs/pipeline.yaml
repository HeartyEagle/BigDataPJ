# 项目统一配置。组长维护本文件，其他同学新增参数时先和组长对齐字段名。
paths:
  raw_dir: data/raw
  cleaned_metrics: data/cleaned/metrics_cleaned.csv
  cleaned_business: data/cleaned/business_cleaned.csv
  sample_small: data/sample/sample_small.csv
  sample_medium: data/sample/sample_medium.csv
  profiles_dir: results/profiles
  anomalies_dir: results/anomalies
  performance_dir: results/performance

data_contract:
  # 来自《训练数据说明.xlsx》的性能指标接口。
  metrics_columns: [timestamp, cmdb_id, kpi_name, value]
  # 业务指标黄金指标：rr 响应率、sr 成功率、count 交易量、mrt 平均响应时间。
  business_columns: [timestamp, service, rr, sr, count, mrt]
  timestamp_unit: sec
  sampling_interval_sec: 60
  series_key: [cmdb_id, kpi_name]

baseline:
  iqr_multiplier: 1.5
  ksigma_k: 3.0
  sliding_window: 60
  range_rules:
    default:
      low:
      high:
    percent:
      low: 0
      high: 100

cluster:
  master: server-1
  workers: [server-2, server-3]
  shard_key: series_id

hadoop:
  hdfs_base: /bigdatapj
  # 实际服务器路径（10.176.62.221，HADOOP_HOME=/opt/hadoop）
  hdfs_raw: /bigdatapj/timeseries/raw/metric
  hdfs_cleaned_existing: /bigdatapj/timeseries/preprocess/cleaned_job/cleaned
  hdfs_cleaned_member3: /bigdatapj/timeseries/preprocess/member3_cleaned
  hdfs_profiles_member3: /bigdatapj/timeseries/preprocess/member3_profiles
  hdfs_anomalies: /bigdatapj/timeseries/anomaly
  hdfs_profiles: /bigdatapj/results/profiles
  # streaming jar 由 run_member3.sh 自动探测，也可手动指定
  streaming_jar: /opt/module/hadoop/share/hadoop/tools/lib/hadoop-streaming-3.2.4.jar
  # 成员 3 预处理
  mapper_clean: src/hadoop/mapper_clean.py
  reducer_clean: src/hadoop/reducer_clean.py
  mapper_profile: src/hadoop/mapper_profile.py
  reducer_profile: src/hadoop/reducer_profile.py
  # 成员 4/5 baseline 异常检测
  mapper_baseline: src/hadoop/mapper_baseline.py
  reducer_baseline: src/hadoop/reducer_baseline.py
